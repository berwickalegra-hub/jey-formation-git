name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Dummy env so the backend can boot during typecheck/build (validation runs at import-time).
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      JWT_SECRET: ci-only-jwt-secret-at-least-32-characters-long-xyz
      COOKIE_PREFIX: app
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_COOKIE_PREFIX: app

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Prisma generate
        run: pnpm --filter backend exec prisma generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
