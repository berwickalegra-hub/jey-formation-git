# Local development dependencies.
#
#   docker compose up -d        # spin up Postgres, Redis, MinIO, Mailpit
#   docker compose down         # stop everything (data persists in named volumes)
#   docker compose down -v      # nuke data too
#
# The Next.js app runs on the host (`pnpm dev` -> :3000) and connects to
# these containers via the localhost ports below. This keeps `next dev`
# fast and lets IDE integrations (debugger, prisma studio) work locally.
#
# Endpoints once it's up:
#   Postgres   localhost:5432    (postgres / postgres)
#   Redis      localhost:6379
#   MinIO API  localhost:9000    (minio / minio12345)
#   MinIO web  localhost:9001
#   Mailpit    localhost:8025    (web UI; SMTP on 1025)

services:
  postgres:
    image: postgres:16-alpine
    container_name: amadou-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amadou_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d amadou_dev']
      interval: 5s
      timeout: 3s
      retries: 10

  # Upstash-compatible Redis. The app talks to Upstash via REST in prod;
  # in dev we use stock Redis + the fact that the Upstash client supports
  # local-mode via REDIS_URL (set in .env, see .env.example below).
  redis:
    image: redis:7-alpine
    container_name: amadou-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible — drop-in for Cloudflare R2 in dev. The app uses the
  # AWS SDK v3 client (frontend/src/lib/server/storage.ts). Endpoint URL
  # override goes in .env (R2_ACCOUNT_ID becomes irrelevant; supply
  # R2_ENDPOINT_URL=http://localhost:9000 instead).
  minio:
    image: minio/minio:latest
    container_name: amadou-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 10

  # Auto-create a default bucket so dev doesn't need to click around.
  minio-init:
    image: minio/mc:latest
    container_name: amadou-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minio minio12345 &&
      /usr/bin/mc mb --ignore-existing local/uploads &&
      /usr/bin/mc anonymous set download local/uploads;
      exit 0;
      "

  # SMTP receiver with web inbox at :8025 — drop-in for Resend in dev.
  # Point EMAIL_FROM at any address; Mailpit captures everything.
  mailpit:
    image: axllent/mailpit:latest
    container_name: amadou-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # web UI
    environment:
      MP_MAX_MESSAGES: 5000

volumes:
  postgres_data:
  minio_data:
